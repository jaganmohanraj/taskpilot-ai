services:
  - type: web
    name: taskpilot-ai
    runtime: node
    buildCommand: npm install --include=dev && npm run build && npm prune --omit=dev
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: ./artifacts/taskpilot.db
    disk:
      name: taskpilot-data
      mountPath: /opt/render/project/src/artifacts
      sizeGB: 1
